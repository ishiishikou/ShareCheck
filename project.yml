name: ShareCheck
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: ""
targets:
  ShareCheck:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShareCheck
        excludes:
          - Info.plist
          - Assets.xcassets
    resources:
      - ShareCheck/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ShareCheck
        INFOPLIST_FILE: ShareCheck/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
