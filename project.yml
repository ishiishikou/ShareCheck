name: ShareCheck
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: ""
targets:
  ShareCheck:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShareCheck
        excludes:
          - Info.plist
          - Assets.xcassets
    resources:
      - ShareCheck/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ShareCheck
        INFOPLIST_FILE: ShareCheck/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ShareCheckTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ShareCheckTests
    dependencies:
      - target: ShareCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ShareCheckTests
        GENERATE_INFOPLIST_FILE: YES

  ShareCheckUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ShareCheckUITests
    dependencies:
      - target: ShareCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ShareCheckUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: ShareCheck
schemes:
  ShareCheck:
    build:
      targets:
        ShareCheck: all
        ShareCheckTests: [test]
        ShareCheckUITests: [test]
    test:
      targets:
        - ShareCheckTests
        - ShareCheckUITests
