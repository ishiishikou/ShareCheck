name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Show destinations
        run: |
          xcodebuild \
            -project ShareCheck.xcodeproj \
            -scheme ShareCheck \
            -showdestinations
      - name: Build
        run: |
          xcodebuild \
            -project ShareCheck.xcodeproj \
            -scheme ShareCheck \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Test
        run: |
          xcodebuild test \
            -project ShareCheck.xcodeproj \
            -scheme ShareCheck \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
