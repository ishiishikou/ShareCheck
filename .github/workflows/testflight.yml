name: TestFlight Distribution

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "CFBundleShortVersionString. Example: 1.0"
        required: true
        default: "1.0"
      build_number:
        description: "CFBundleVersion. Leave empty to use the GitHub Actions run number."
        required: false
        default: ""
      bundle_id:
        description: "Optional bundle ID override. Leave empty to use APP_BUNDLE_ID secret."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: testflight-distribution
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_NAME: ShareCheck
      SCHEME: ShareCheck
      PROJECT_PATH: ShareCheck.xcodeproj
      CONFIGURATION: Release
      MARKETING_VERSION: ${{ inputs.marketing_version }}
      BUILD_NUMBER: ${{ inputs.build_number != '' && inputs.build_number || github.run_number }}
      BUNDLE_ID: ${{ inputs.bundle_id != '' && inputs.bundle_id || secrets.APP_BUNDLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Validate required configuration
        run: |
          set -euo pipefail

          missing=0
          for name in \
            BUNDLE_ID \
            APPLE_TEAM_ID \
            CERTIFICATE_BASE64 \
            CERTIFICATE_PASSWORD \
            PROVISIONING_PROFILE_BASE64 \
            ASC_KEY_ID \
            ASC_ISSUER_ID \
            ASC_PRIVATE_KEY_BASE64
          do
            if [ -z "${!name}" ]; then
              echo "Missing required value: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Configure the required GitHub Actions secrets before running this workflow."
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install signing certificate
        id: install_certificate
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          export CERTIFICATE_PATH

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERTIFICATE_PATH"]).write_bytes(base64.b64decode(os.environ["CERTIFICATE_BASE64"]))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Install provisioning profile
        id: install_profile
        run: |
          set -euo pipefail

          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          export PROFILE_PATH

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["PROFILE_PATH"]).write_bytes(base64.b64decode(os.environ["PROVISIONING_PROFILE_BASE64"]))
          PY
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
          PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$PROFILE_PLIST")

          if [ "$PROFILE_TEAM" != "$APPLE_TEAM_ID" ]; then
            echo "Provisioning profile team '${PROFILE_TEAM}' does not match APPLE_TEAM_ID '${APPLE_TEAM_ID}'."
            exit 1
          fi

          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create App Store Connect API key
        run: |
          set -euo pipefail

          ASC_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          export ASC_KEY_PATH

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["ASC_KEY_PATH"]).write_bytes(base64.b64decode(os.environ["ASC_PRIVATE_KEY_BASE64"]))
          PY
          chmod 600 "$ASC_KEY_PATH"

      - name: Archive app
        run: |
          set -euo pipefail

          ARCHIVE_PATH="$RUNNER_TEMP/${APP_NAME}.xcarchive"

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            clean archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.install_profile.outputs.profile_name }}" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.install_certificate.outputs.keychain_path }}"

          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export IPA
        run: |
          set -euo pipefail

          EXPORT_OPTIONS_PATH="$RUNNER_TEMP/ExportOptions.plist"
          EXPORT_PATH="$RUNNER_TEMP/export"

          cat > "$EXPORT_OPTIONS_PATH" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${{ steps.install_profile.outputs.profile_name }}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PATH" \
            -exportPath "$EXPORT_PATH"

          IPA_PATH=$(find "$EXPORT_PATH" -type f -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA was exported."
            exit 1
          fi

          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        run: |
          set -euo pipefail

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Clean signing materials
        if: always()
        run: |
          set +e

          if [ -n "${{ steps.install_certificate.outputs.keychain_path }}" ]; then
            security delete-keychain "${{ steps.install_certificate.outputs.keychain_path }}"
          fi

          rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          rm -f "$RUNNER_TEMP/distribution.p12"
          rm -f "$RUNNER_TEMP/profile.mobileprovision"
          rm -f "$RUNNER_TEMP/profile.plist"
